name: Build Debian package

env:
  CLOUDSMITH_REPO: thetranscend/relay
  CLOUDSMITH_DISTRO: debian
  CLOUDSMITH_RELEASE: bookworm

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-pytest \
            python3-setuptools \
            python3-wheel \
            devscripts

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../termcopy_*_all.deb artifacts/
          cp ../termcopy_*.changes artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: artifacts/*

      - name: Publish to Cloudsmith (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          python3 -m pip install --upgrade pip cloudsmith-cli
          for pkg in artifacts/*.deb; do
            cloudsmith push deb "$CLOUDSMITH_REPO/$CLOUDSMITH_DISTRO/$CLOUDSMITH_RELEASE" "$pkg" --api-key "$CLOUDSMITH_API_KEY"
          done
